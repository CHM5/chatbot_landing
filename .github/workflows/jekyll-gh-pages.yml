name: Deploy Vite app to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: pnpm vite build

      - name: Add .nojekyll
        run: touch dist/public/.nojekyll

      - name: Prepare SPA fallback
        run: |
          cat > dist/public/404.html <<'EOF'
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Redirecting...</title>
            <script>
              sessionStorage.setItem('gh-pages-redirect', location.pathname + location.search + location.hash);
              location.replace('./');
            </script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Restore redirected path hook
        run: |
          node -e "const fs=require('fs');const p='dist/public/index.html';const h=fs.readFileSync(p,'utf8');const s='<script>(function(){const r=sessionStorage.getItem(\'gh-pages-redirect\');if(r){sessionStorage.removeItem(\'gh-pages-redirect\');history.replaceState(null,\'\',r);}})();</script>';fs.writeFileSync(p,h.replace('</head>',s+'</head>'));"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
